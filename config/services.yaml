---
- Server Resources:
    - CPU:
        widget:
          type: glances
          url: http://192.168.1.29:61208
          version: 4
          metric: cpu
          chart: false
          refreshInterval: 5000

    - Memory:
        widget:
          type: glances
          url: http://192.168.1.29:61208
          version: 4
          metric: memory
          chart: false
          refreshInterval: 5000

    - Root Disk:
        widget:
          type: glances
          url: http://192.168.1.29:61208
          version: 4
          metric: fs:/etc/hosts
          chart: false
          refreshInterval: 10000

    - GPU:
        widget:
          type: customapi
          url: http://gpu-status-api:8788/gpu
          refreshInterval: 5000
          display: list
          mappings:
            - field: utilization_gpu
              label: Load
              format: float
              suffix: "%"
            - field: memory_used
              label: Memory
              format: float
              suffix: " MiB"
              additionalField:
                field: memory_total
                color: theme
                format: float
                suffix: " MiB"
            - field: temperature
              label: Temp
              format: float
              suffix: " C"

    - Network:
        widget:
          type: glances
          url: http://192.168.1.29:61208
          version: 4
          metric: network:eno1
          chart: false
          refreshInterval: 5000

- API Balances:
    - DeepSeek:
        icon: mdi-wallet-outline
        href: https://platform.deepseek.com/usage
        description: API credit
        widget:
          type: customapi
          url: http://deepseek-balance-api:8787/balance
          refreshInterval: 600000
          display: list
          mappings:
            - field: total_balance
              label: Balance
              format: float
              prefix: "$"
              additionalField:
                field: currency
                color: theme
                format: text
            - field: is_available
              label: Status
              format: text
              remap:
                - value: true
                  to: Available
                - value: false
                  to: Unavailable

    - OpenAI:
        icon: si-openai
        href: https://platform.openai.com/home
        description: Month-to-date API spend
        widget:
          type: customapi
          url: http://openai-cost-api:8790/costs
          refreshInterval: 600000
          display: list
          mappings:
            - field: month_spend
              label: Spend
              format: float
              prefix: "$"
              additionalField:
                field: currency
                color: theme
                format: text
            - field: period
              label: Period
              format: text

- Web Services:
    - XTCG Web:
        icon: mdi-cards-playing-outline
        href: http://192.168.1.29/
        description: Web UI on :80
        siteMonitor: http://192.168.1.29/
        server: local-docker
        container: xtcg-web

    - RPchat:
        icon: mdi-chat-processing-outline
        href: http://192.168.1.29:8001/
        description: Web UI on :8001
        siteMonitor: http://192.168.1.29:8001/
        server: local-docker
        container: rpchat-deepseek

    - PersonalAI:
        icon: mdi-brain
        href: http://192.168.1.29:8002/
        description: AI assistant on :8002
        siteMonitor: http://192.168.1.29:8002/
        server: local-docker
        container: personal-ai

- Background Processes:
    - XTCG Backend API:
        icon: mdi-api
        description: Backend container
        server: local-docker
        container: xtcg-api

    - XTCG Training Worker:
        icon: mdi-cpu-64-bit
        description: GPU training worker
        server: local-docker
        container: xtcg-worker

    - Discord Bot:
        icon: si-discord
        description: Worker process
        server: local-docker
        container: my-server-discord-bot

- XTCG Operations:
    - Current Work:
        icon: mdi-clipboard-text-clock-outline
        description: Jobs and submitted batches
        widget:
          type: customapi
          url: http://xtcg-runtime-api:8789/current-work
          refreshInterval: 5000
          display: list
          mappings:
            - field: work_label
              label: Workload
              format: text
            - field: current_label
              label: Current
              format: text
            - field: next_label
              label: Next
              format: text
            - field: batch_label
              label: Batch
              format: text

    - Runtime:
        icon: mdi-engine-outline
        description: Worker and execution status
        widget:
          type: customapi
          url: http://xtcg-runtime-api:8789/runtime
          refreshInterval: 5000
          display: list
          mappings:
            - field: status
              label: State
              format: text
              remap:
                - value: idle
                  to: Idle
                - value: busy
                  to: Busy
                - value: degraded
                  to: Degraded
                - value: unavailable
                  to: Unavailable
            - field: worker_label
              label: Worker
              format: text
            - field: executor_label
              label: Executor
              format: text
            - field: queue_label
              label: Queue
              format: text
            - field: failure_label
              label: Recent failures
              format: text

- Dashboard Infrastructure:
    - Homepage:
        icon: sh-homepage.svg
        href: http://192.168.1.29:3000/
        description: UI
        siteMonitor: http://homepage:3000/
        server: local-docker
        container: localserver-homepage

    - Metrics API:
        icon: si-serverfault
        description: Glances
        siteMonitor: http://192.168.1.29:61208/
        server: local-docker
        container: localserver-homepage-glances

    - Docker Proxy:
        icon: si-docker
        description: Read-only API
        server: local-docker
        container: localserver-homepage-dockerproxy
