services:
  glances:
    image: ${GLANCES_IMAGE:-nicolargo/glances:latest}
    container_name: localserver-homepage-glances
    restart: unless-stopped
    pid: host
    network_mode: host
    environment:
      GLANCES_OPT: "-w"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/os-release:/etc/os-release:ro
      - /sys:/sys:ro

  dockerproxy:
    image: ${DOCKER_SOCKET_PROXY_IMAGE:-ghcr.io/tecnativa/docker-socket-proxy:latest}
    container_name: localserver-homepage-dockerproxy
    restart: unless-stopped
    environment:
      CONTAINERS: "1"
      SERVICES: "1"
      TASKS: "1"
      POST: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - homepage

  homepage:
    image: ${HOMEPAGE_IMAGE:-ghcr.io/gethomepage/homepage:latest}
    container_name: localserver-homepage
    restart: unless-stopped
    depends_on:
      - dockerproxy
      - glances
    env_file:
      - app.env
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    ports:
      - ${HOMEPAGE_BIND_ADDRESS:-0.0.0.0}:${HOMEPAGE_PORT:-3000}:3000
    volumes:
      - ${HOMEPAGE_CONFIG_DIR:-./config}:/app/config
    networks:
      - homepage

networks:
  homepage:
